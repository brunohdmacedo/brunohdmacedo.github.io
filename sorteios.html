<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio M4A1-S | Terror Noturno</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 40px;
    background: radial-gradient(circle, #1f1f1f, #0a0a0a);
}

.header h1 {
    color: red;
}

/* SKIN */
.skin-container img {
    width: 80%;
    max-width: 800px;
    border-radius: 15px;
    box-shadow: 0 0 40px red;
}

/* INFO */
.info {
    margin: 30px auto;
    max-width: 700px;
}

/* BOTÃO */
.btn {
    margin-top: 20px;
    padding: 15px 25px;
    background: red;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

/* PARTICIPANTES */
#participants {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.participant {
    background: #111;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 250px;
}

.participant img {
    width: 80px;
    border-radius: 50%;
}

.prints img {
    width: 100px;
    margin: 5px;
    border-radius: 8px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.modal-content {
    background: #111;
    margin: 10% auto;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
<h1>🔥 Sorteio M4A1-S | Terror Noturno 🔥</h1>
</div>

<div class="skin-container">
<img src="images/m4a1-terror.png">
</div>

<div class="info">
<p>Use o cupom <b>BHSKING</b> e envie os comprovantes para ganhar mais chances!</p>

<!-- BOTÃO -->
<button class="btn" onclick="openModal()">📸 Enviar prints</button>
</div>

<!-- GLEAM -->
<a class="e-widget no-button" href="https://gleam.io/fUvxq/sorteio-1-de-m4a1-s-terror-noturno"></a>

<!-- PARTICIPANTES -->
<h2>👥 Participantes</h2>
<div id="participants"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<h3>Enviar Provas</h3>

<form id="form">
<input type="text" id="name" placeholder="Nome" required>
<input type="text" id="photo" placeholder="URL foto Steam" required>
<input type="text" id="trade" placeholder="Trade Link" required>

<p>Print Cupom:</p>
<input type="file" id="coupon" required>

<p>Print Recarga:</p>
<input type="file" id="deposit" required>

<button type="submit">Enviar</button>
</form>

<button onclick="closeModal()">Fechar</button>
</div>
</div>

<script src="https://widget.gleamjs.io/e.js" async></script>

<script>
// MODAL
function openModal(){ document.getElementById("modal").style.display="block"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

// CARREGAR PARTICIPANTES
let participants = JSON.parse(localStorage.getItem("participants")) || [];

function render(){
    const container = document.getElementById("participants");
    container.innerHTML = "";

    participants.forEach(p => {
        const div = document.createElement("div");
        div.className = "participant";

        div.innerHTML = `
            <img src="${p.photo}">
            <h3>${p.name}</h3>
            <a href="${p.trade}" target="_blank">Trade</a>

            <div class="prints">
                <img src="${p.coupon}">
                <img src="${p.deposit}">
            </div>
        `;
        container.appendChild(div);
    });
}

// FORM
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const photo = document.getElementById("photo").value;
    const trade = document.getElementById("trade").value;

    const coupon = URL.createObjectURL(document.getElementById("coupon").files[0]);
    const deposit = URL.createObjectURL(document.getElementById("deposit").files[0]);

    participants.push({ name, photo, trade, coupon, deposit });

    localStorage.setItem("participants", JSON.stringify(participants));

    render();
    closeModal();
});

// INIT
render();
</script>

</body>
</html>
